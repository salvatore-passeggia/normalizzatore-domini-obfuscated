<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Bro, quo vadis?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        
        .animate-pulse-slow {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .text-glow {
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-600 min-h-screen flex items-center justify-center p-4 text-white overflow-hidden relative">

    <!-- Animated background elements -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-10 left-10 w-32 h-32 bg-white/10 rounded-full blur-3xl animate-pulse-slow"></div>
        <div class="absolute bottom-10 right-10 w-48 h-48 bg-purple-400/20 rounded-full blur-3xl animate-pulse-slow" style="animation-delay: 1s;"></div>
        <div class="absolute top-1/2 left-1/4 w-24 h-24 bg-pink-400/20 rounded-full blur-2xl animate-pulse-slow" style="animation-delay: 2s;"></div>
    </div>

    <main class="glass-effect rounded-3xl p-8 md:p-12 max-w-2xl w-full text-center relative z-10 shadow-2xl animate-float">
        
        

        <!-- 404 Number -->
        <h1 class="text-8xl md:text-8xl font-black mb-2 text-glow tracking-tighter">
            Error: 404
        </h1>

        <!-- Bro Fist -->
        <div class="text-6xl md:text-7xl mb-6 animate-bounce">
            🤜🤛
        </div>

        <!-- Main Message -->
        <h2 class="text-2xl md:text-4xl font-bold mb-4 leading-tight">
            Hey Bro, quo vadis?
        </h2>

        <p class="text-lg md:text-xl text-white/80 mb-8 leading-relaxed">
            Lascia perdere il navigatore, la strada giusta è un'altra...
        </p>

        <!-- The Solution -->
        <p class="text-sm uppercase tracking-widest text-white/60 mb-4">La destinazione corretta  • Redirect consigliato</p>
        
        <!-- CTA Button -->
        <a href="https://salvatore-passeggia.github.io/normalizzatore-domini-obfuscated/Normalizza_Domini.html" 
           class="inline-flex items-center gap-3 bg-white text-purple-700 font-bold text-lg md:text-xl px-8 py-4 rounded-full 
                  hover:scale-105 hover:shadow-xl transition-all duration-300 group mb-8">
            <span>🚀 Vai al Normalizzatore - Click Here!</span>
            <i data-lucide="arrow-right" class="w-6 h-6 group-hover:translate-x-1 transition-transform"></i>
        </a>

        <!-- Random bro quote generator -->
        <div class="mt-6 pt-6 border-t border-white/10">
            <button onclick="newQuote()" class="text-xs text-white/40 hover:text-white/80 transition-colors flex items-center gap-2 mx-auto">
                <i data-lucide="refresh-cw" class="w-3 h-3"></i>
                <span>Genera scuse random</span>
            </button>
            <p id="random-quote" class="text-sm text-white/70 mt-2 italic"></p>
        </div>
    </main>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Random quotes generator
        const quotes = [
            "Il saggio non cerca l'index, crea la sua strada.",
			      "Chi va piano va sano e va.. in 404.",
            "Hai provato a spegnere e riaccendere il server?",
            "404: Motivazione non trovata.",
            "Questa pagina è in vacanza, torna più tardi.",
            "Hai perso la strada? Unisciti al club.",
			      "E meno male che c'e' la redirect, che furbata!",
            "Il percorso giusto richiede qualche 404 di troppo.",
            "Quo vadis? Verso il normalizzatore, ovviamente.",
			      "Stai per cliccare a tuo rischio e pericolo.",
			      "Stiamo lavorando per noi, ma anche per voi..",
            "Qui non c'è nulla, nemmeno i bug.. Strano."
        ];

        function newQuote() {
            const quote = quotes[Math.floor(Math.random() * quotes.length)];
            const quoteElement = document.getElementById('random-quote');
            quoteElement.style.opacity = '0';
            setTimeout(() => {
                quoteElement.textContent = `"${quote}"`;
                quoteElement.style.opacity = '1';
            }, 200);
        }

        // Show first quote
        newQuote();
    </script>
</body>
</html>
